name: CI

# GitHub-hosted jobs are temporarily manual because this repository's hosted
# runner currently fails before executing any workflow step. Local validation
# remains available through: npm run materialize && npm install && npm run check && npm run build
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm run materialize
      - run: npm install
      - run: npm run check
      - run: npm run build
