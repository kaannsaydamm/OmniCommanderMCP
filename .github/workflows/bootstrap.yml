name: Bootstrap Omni Commander source

on:
  push:
    branches:
      - feat/remote-computer-use
    paths:
      - '.omni/**'
      - '.github/workflows/bootstrap.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.omni/**'
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/remote-computer-use
          fetch-depth: 0

      - name: Materialize tested source tree
        shell: bash
        run: |
          set -euo pipefail
          cat .omni/chunk-* > /tmp/omni.b64
          base64 --decode /tmp/omni.b64 > /tmp/omni.tar.gz
          tar -xzf /tmp/omni.tar.gz -C .
          rm -rf .omni .github/workflows/bootstrap.yml

      - name: Commit source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: replace prototype with Omni Commander 0.2.0'
          git push origin HEAD:feat/remote-computer-use
