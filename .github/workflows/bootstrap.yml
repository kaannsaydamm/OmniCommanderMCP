name: Bootstrap Omni Commander source

on:
  push:
    branches:
      - feat/remote-computer-use
    paths:
      - '.omni/**'
      - '.github/workflows/bootstrap.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.omni/**'
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/remote-computer-use
          fetch-depth: 0
          persist-credentials: true

      - name: Materialize tested source tree
        id: materialize
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/omni-bootstrap.log) 2>&1
          echo '== staged chunks =='
          ls -la .omni
          cat .omni/chunk-* > /tmp/omni.b64
          test "$(wc -c < /tmp/omni.b64)" -eq 109992
          base64 --decode /tmp/omni.b64 > /tmp/omni.tar.gz
          gzip -t /tmp/omni.tar.gz
          tar -tzf /tmp/omni.tar.gz > /tmp/omni-files.txt
          wc -l /tmp/omni-files.txt
          tar -xzf /tmp/omni.tar.gz -C .
          test -f package.json
          grep -q '"version": "0.2.0"' package.json
          npm install
          npm run check
          npm run build

      - name: Commit materialized source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: materialize Omni Commander 0.2.0 source tree'
          git push origin HEAD:feat/remote-computer-use

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omni-bootstrap-diagnostics
          path: |
            /tmp/omni-bootstrap.log
            /tmp/omni-files.txt
          if-no-files-found: ignore
