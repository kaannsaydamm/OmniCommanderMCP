name: Bootstrap Omni Commander source

on:
  push:
    branches:
      - feat/remote-computer-use
    paths:
      - '.omni/**'
      - '.github/workflows/bootstrap.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.omni/**'
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/remote-computer-use
          fetch-depth: 0

      - name: Materialize and commit tested source tree
        shell: bash
        run: |
          set +e
          exec > >(tee /tmp/omni-bootstrap.log) 2>&1
          echo '== staged chunks =='
          ls -la .omni
          echo '== concatenate =='
          cat .omni/chunk-* > /tmp/omni.b64
          wc -c /tmp/omni.b64
          echo '== decode =='
          base64 --decode /tmp/omni.b64 > /tmp/omni.tar.gz
          status=$?
          echo "decode_status=$status"
          if [ "$status" -eq 0 ]; then
            gzip -t /tmp/omni.tar.gz
            status=$?
            echo "gzip_status=$status"
          fi
          if [ "$status" -eq 0 ]; then
            tar -tzf /tmp/omni.tar.gz | head -100
            status=${PIPESTATUS[0]}
            echo "tar_list_status=$status"
          fi
          if [ "$status" -eq 0 ]; then
            tar -xzf /tmp/omni.tar.gz -C .
            status=$?
            echo "tar_extract_status=$status"
          fi
          if [ "$status" -eq 0 ]; then
            rm -rf .omni .github/workflows/bootstrap.yml
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git status --short
            git commit -m 'feat: replace prototype with Omni Commander 0.2.0'
            status=$?
            echo "commit_status=$status"
          fi
          if [ "$status" -eq 0 ]; then
            git push origin HEAD:feat/remote-computer-use
            status=$?
            echo "push_status=$status"
          fi
          if [ "$status" -ne 0 ]; then
            mkdir -p .omni
            cp /tmp/omni-bootstrap.log .omni/bootstrap-error.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .omni/bootstrap-error.txt
            git commit -m 'chore: capture bootstrap failure' || true
            git push origin HEAD:feat/remote-computer-use || true
            exit "$status"
          fi
